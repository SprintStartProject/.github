name: Feature Request / User Story
description: Propose a new feature or describe a user story for the backlog
title: "[Feature]: "
labels: ["feature", "backlog"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Use this template for new features and user stories.

  - type: textarea
    id: user_story
    attributes:
      label: User Story
      description: Describe the feature from the user's perspective.
      placeholder: |
        As a [role],
        I want to [action],
        so that [benefit / value].
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context & Motivation
      description: Why is this needed? What problem does it solve? Link to
        requirements if applicable.

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: Specific, testable conditions that must be met for this issue to be
        considered done.
      placeholder: |
        - [ ] Given ... when ... then ...
        - [ ] Given ... when ... then ...
        - [ ] Edge case: ...
    validations:
      required: true

  - type: textarea
    id: technical_notes
    attributes:
      label: Technical Notes
      description: Optional — implementation hints, affected components, API changes,
        or design constraints.

  - type: textarea
    id: related
    attributes:
      label: Related Issues / PRs / ADRs
      description: "e.g. #42, SS-011, ADR-003"
