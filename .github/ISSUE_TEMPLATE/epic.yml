name: Epic
description: A larger body of work that contains multiple user stories
title: "[Epic]: "
labels: ["epic"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Use this template for epics — larger themes that span multiple user stories.
        Individual user stories will be linked as **sub-issues** of this epic.

  - type: textarea
    id: epic_description
    attributes:
      label: Epic Description
      description: Describe the overarching goal from the user's or business perspective.
      placeholder: |
        As a [role / business],
        we want to [larger capability],
        so that [strategic benefit / value].
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Context / Motivation
      description: Why is this epic relevant now? What problem does it solve?
    validations:
      required: false

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria 
      description: High-level, testable conditions that must be met for this epic to be
        considered done.
      value: |
        - [ ] 
        - [ ] 
    validations:
      required: true

  - type: textarea
    id: technical_notes
    attributes:
      label: Technical Notes
      description: Architectural considerations, affected components, dependencies,
        or design constraints across the epic.
      placeholder: Depends on Epic #42; requires Auth Service v2
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        ---
        **Next steps after creating this epic:**
        1. Set the issue type to `Epic` in the right sidebar (if available)
        2. Link or create user stories via the **Sub-issues** section
